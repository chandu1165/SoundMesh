services:
  - type: web
    name: auralyze
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: AI_PROVIDER
        value: local-rules
      - key: AURALYZE_STORAGE
        value: sqlite
      - key: AURALYZE_WEB_DIR
        value: /app/web
      - key: AURALYZE_FALLBACK_MAX_SECONDS
        value: "180"
